<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>침 발사! 친구 비행단</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#0b1026; overflow:hidden; }
  #wrap { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { background:#efe6d2; display:block; max-width:100%; max-height:100%; touch-action:none; border-radius:8px; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#fff; background:rgba(7,10,30,0.92); padding:20px; gap:16px; z-index:10; }
  .hidden { display:none !important; }
  h1 { font-size:26px; }
  p { font-size:14px; opacity:0.85; line-height:1.6; }
  #faceChoices { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:420px; }
  .face { width:60px; height:60px; border-radius:50%; background:#222a55; display:flex; align-items:center; justify-content:center; font-size:34px; cursor:pointer; border:3px solid transparent; overflow:hidden; }
  .face.selected { border-color:#ffd84d; transform:scale(1.1); }
  .face img { width:100%; height:100%; object-fit:cover; }
  button { background:#ffd84d; color:#222; border:none; padding:12px 30px; font-size:18px; font-weight:800; border-radius:999px; cursor:pointer; }
  .upload { font-size:13px; color:#9fb0ff; cursor:pointer; text-decoration:underline; }
  #hud { position:absolute; top:12px; left:12px; color:#fff; z-index:5; background:rgba(10,14,40,0.6); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:8px 12px; font-size:14px; font-weight:700; line-height:1.5; min-width:120px; }
  #hud b { color:#ffd84d; font-weight:800; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="420" height="640"></canvas>
  <div id="hud" class="hidden"></div>

  <div id="startScreen" class="overlay">
    <h1>✈️💦 침 발사! 친구 비행단</h1>
    <p>비행기로 쓸 친구 얼굴을 골라줘!<br>이동: 방향키 / 마우스 · 발사: 스페이스바 / 클릭</p>
    <p style="background:rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.7;">🧑‍⚕️ <b>대표원장님은 쏘면 안돼!</b><br>🏖️ <b>연차 먹으면 목숨 1개 늘어나!</b></p>
    <div id="faceChoices"></div>
    <label class="upload" id="registerLabel">👨‍👩‍👧‍👦 친구 얼굴 등록하기 (한 번만, 최대 4명)<input id="fileInput" type="file" accept="image/*" multiple hidden></label>
    <button id="startBtn">게임 시작</button>
    <span class="upload" id="resetLink">얼굴 다시 등록</span>
  </div>

  <div id="gameOver" class="overlay hidden">
    <h1>게임 오버 💀</h1>
    <p id="finalScore"></p>
    <button id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const hud = document.getElementById('hud');

const DEFAULT_FACES = ['face1.png','face2.png','face3.png','face4.png'];
let faces = [];
let selectedIndex = 0;

function loadSavedFaces(){
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('friendFaces') || '[]'); } catch(e) { saved = []; }
  if(saved.length){
    faces = saved.map(src => { const img = new Image(); img.onload = ()=> renderFaceChoices(); img.src = src; return {type:'img', src, img}; });
  } else {
    // 같은 폴더(GitHub 포함)에 face1~4.png 가 있으면 자동으로 기본 얼굴로 사용
    faces = [];
    DEFAULT_FACES.forEach(fn=>{
      const img = new Image();
      img.onload = ()=>{ faces.push({ type:'img', src:fn, img }); renderFaceChoices(); };
      img.src = fn;
    });
  }
}
loadSavedFaces();

const faceChoices = document.getElementById('faceChoices');
function renderFaceChoices(){
  faceChoices.innerHTML = '';
  faces.forEach((f,i)=>{
    const d = document.createElement('div');
    d.className = 'face' + (i===selectedIndex ? ' selected' : '');
    const img = document.createElement('img'); img.src = f.src; d.appendChild(img);
    d.onclick = ()=>{ selectedIndex = i; renderFaceChoices(); };
    faceChoices.appendChild(d);
  });
  if(selectedIndex >= faces.length) selectedIndex = 0;
  const has = faces.length > 0;
  document.getElementById('startBtn').style.display = has ? '' : 'none';
  document.getElementById('registerLabel').style.display = has ? 'none' : '';
  document.getElementById('resetLink').style.display = has ? '' : 'none';
}
renderFaceChoices();

let player, bullets, enemies, particles, items, score, lives, running, spawnTimer, spawnInterval, elapsed, keys, playerFace, invuln, level, dirTimer, leaveTimer, flash;
const MAX_LIVES = 5;
let highScore = parseInt(localStorage.getItem('shooterHighScore') || '0', 10);
let shooting = false, fireCooldown = 0, pointerActive = false;

function resetGame(){
  playerFace = faces[selectedIndex];
  player = { x:W/2, y:H-80, size:56, speed:6 };
  bullets = []; enemies = []; particles = [];
  score = 0; lives = 3; running = true;
  spawnTimer = 0; spawnInterval = 70; elapsed = 0; invuln = 0; level = 1;
  items = []; dirTimer = 0; leaveTimer = 0; flash = 0;
  keys = {}; shooting = false; fireCooldown = 0;
}

function drawFace(face, x, y, size){
  if(!face || face.type==='emoji'){
    ctx.font = size+'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(face ? face.value : '😀', x, y);
  } else {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, size/2, 0, Math.PI*2);
    ctx.closePath(); ctx.clip();
    ctx.drawImage(face.img, x-size/2, y-size/2, size, size);
    ctx.restore();
    ctx.strokeStyle = '#ffd84d'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x, y, size/2, 0, Math.PI*2); ctx.stroke();
  }
}

const enemyTypes = [
  { file:'enemy1.png', emoji:'👵', label:'허리 아픈 할머니' },
  { file:'enemy2.png', emoji:'👵', label:'목 아픈 할머니' },
  { file:'enemy3.png', emoji:'👵', label:'배 아픈 할머니' },
  { file:'enemy4.png', emoji:'💪', label:'헬창' },
];
enemyTypes.forEach(t=>{ const im = new Image(); t.img = im; t.ready = false; im.onload = ()=>{ t.ready = true; }; im.src = t.file; });

document.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.key===' ') e.preventDefault(); });
document.addEventListener('keyup', e=>{ keys[e.key]=false; });
canvas.addEventListener('pointerdown', e=>{ pointerActive=true; shooting=true; movePointer(e); });
canvas.addEventListener('pointermove', e=>{ if(pointerActive) movePointer(e); });
window.addEventListener('pointerup', ()=>{ pointerActive=false; shooting=false; });
function movePointer(e){
  const r = canvas.getBoundingClientRect();
  player.x = (e.clientX - r.left) * (W / r.width);
  player.y = (e.clientY - r.top) * (H / r.height);
}

function spawnEnemy(){
  const size = 40 + Math.random()*16;
  const ti = (Math.random()*enemyTypes.length)|0;
  const t = enemyTypes[ti];
  enemies.push({
    x: size + Math.random()*(W - size*2),
    y: -size,
    size,
    vy: 1.1 + Math.random()*0.9 + level*0.35,
    vx: (Math.random()-0.5)*(1.2 + level*0.25),
    ti,
    emoji: t.emoji,
    label: t.label
  });
}

function spawnItem(kind){
  const size = kind==='boss' ? 52 : 40;
  items.push({
    kind,
    x: size + Math.random()*(W - size*2),
    y: -size,
    size,
    vy: (kind==='boss' ? 1.3 : 1.6) + level*0.2,
    vx: (Math.random()-0.5)*1.0
  });
}

function fire(){ bullets.push({ x:player.x, y:player.y - player.size/2, vy:-9 }); }

function loseLife(){ lives--; invuln=60; if(lives<=0) endGame(); }

function spawnParticles(x,y){
  for(let i=0;i<10;i++) particles.push({ x, y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:25+Math.random()*15 });
}

function update(){
  elapsed++;
  if(keys['ArrowLeft']||keys['a']||keys['A']) player.x -= player.speed;
  if(keys['ArrowRight']||keys['d']||keys['D']) player.x += player.speed;
  if(keys['ArrowUp']||keys['w']||keys['W']) player.y -= player.speed;
  if(keys['ArrowDown']||keys['s']||keys['S']) player.y += player.speed;
  player.x = Math.max(player.size/2, Math.min(W-player.size/2, player.x));
  player.y = Math.max(player.size/2, Math.min(H-player.size/2, player.y));

  fireCooldown--;
  if((keys[' '] || shooting) && fireCooldown<=0){ fire(); fireCooldown=10; }

  bullets.forEach(b=> b.y+=b.vy);
  bullets = bullets.filter(b=> b.y > -20);

  level = 1 + Math.floor(elapsed / 540);
  spawnTimer++;
  spawnInterval = Math.max(16, 72 - (level-1)*7);
  if(spawnTimer >= spawnInterval){ spawnTimer=0; spawnEnemy(); if(level >= 4 && Math.random()<0.4) spawnEnemy(); }

  dirTimer++;
  if(dirTimer >= 330){ dirTimer = 0; spawnItem('boss'); }
  leaveTimer++;
  if(leaveTimer >= 720){ leaveTimer = 0; spawnItem('leave'); }
  if(flash > 0) flash--;

  enemies.forEach(en=>{ en.y+=en.vy; en.x+=en.vx; if(en.x<en.size/2||en.x>W-en.size/2) en.vx*=-1; });

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y += it.vy; it.x += it.vx;
    if(it.x<it.size/2||it.x>W-it.size/2) it.vx*=-1;
    if(it.y > H+it.size){ items.splice(i,1); continue; }
    if(it.kind==='boss'){
      let shot=false;
      for(let j=bullets.length-1;j>=0;j--){
        const b=bullets[j];
        const dx=it.x-b.x, dy=it.y-b.y;
        if(dx*dx+dy*dy < (it.size/2+6)*(it.size/2+6)){ bullets.splice(j,1); shot=true; break; }
      }
      if(shot){
        items.splice(i,1);
        score = Math.max(0, score-30);
        flash = 18;
        if(invuln<=0) loseLife();
      }
      continue;
    }
    // 연차: 비행기로 받으면 목숨 +1 (침으로는 못 먹음)
    const dx=it.x-player.x, dy=it.y-player.y;
    if(dx*dx+dy*dy < (it.size/2+player.size/2)*(it.size/2+player.size/2)){
      items.splice(i,1);
      if(lives < MAX_LIVES) lives++;
      score += 20;
      spawnParticles(player.x, player.y);
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      const dx=en.x-b.x, dy=en.y-b.y;
      if(dx*dx+dy*dy < (en.size/2+6)*(en.size/2+6)){
        spawnParticles(en.x,en.y);
        enemies.splice(i,1); bullets.splice(j,1);
        score+=10; break;
      }
    }
  }

  if(invuln>0) invuln--;
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    const dx=en.x-player.x, dy=en.y-player.y;
    const hit = dx*dx+dy*dy < (en.size/2+player.size/2-6)*(en.size/2+player.size/2-6);
    if(en.y > H+en.size){ enemies.splice(i,1); loseLife(); continue; }
    if(hit && invuln<=0){ enemies.splice(i,1); spawnParticles(player.x,player.y); loseLife(); }
  }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; });
  particles = particles.filter(p=> p.life>0);
}

function drawPouch(cx, cy){
  const w=20, h=26;
  ctx.fillStyle='#7a4a23';
  ctx.fillRect(cx-w/2, cy-h/2, w, h);
  ctx.fillStyle='#5e3719';
  ctx.fillRect(cx-w/2, cy-h/2, w, 5);
  ctx.fillStyle='#f0e2c8';
  ctx.fillRect(cx-6, cy-2, 12, 11);
  ctx.fillStyle='#7a4a23';
  ctx.font='9px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('탕', cx, cy+4);
}

function drawNeedle(x, y){
  ctx.save();
  ctx.strokeStyle = '#4a5460';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y-15);
  ctx.lineTo(x, y+3);
  ctx.stroke();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y-15);
  ctx.lineTo(x, y-9);
  ctx.stroke();
  ctx.fillStyle = '#8a8f99';
  ctx.fillRect(x-2.5, y+3, 5, 13);
  ctx.restore();
}

function drawBackground(){
  // 벽 (한지 톤)
  const wall = ctx.createLinearGradient(0,0,0,H*0.72);
  wall.addColorStop(0,'#f1e8d6');
  wall.addColorStop(1,'#e6d8bb');
  ctx.fillStyle = wall;
  ctx.fillRect(0,0,W,H*0.72);
  // 바닥 (원목)
  const floor = ctx.createLinearGradient(0,H*0.72,0,H);
  floor.addColorStop(0,'#c9a06a');
  floor.addColorStop(1,'#b98a52');
  ctx.fillStyle = floor;
  ctx.fillRect(0,H*0.72,W,H*0.28);
  ctx.fillStyle = '#a9763f';
  ctx.fillRect(0,H*0.72-6,W,6);
  ctx.strokeStyle = 'rgba(110,72,34,0.25)';
  ctx.lineWidth = 1;
  for(let fx=24; fx<W; fx+=46){ ctx.beginPath(); ctx.moveTo(fx,H*0.72); ctx.lineTo(fx-12,H); ctx.stroke(); }

  // 왼쪽 약장 (한약 서랍장)
  const cx0=8, cy0=150, cw=58, ch=300, cols=2, rows=9;
  ctx.fillStyle='#8a5a2b'; ctx.fillRect(cx0-3,cy0-3,cw+6,ch+6);
  const dw=cw/cols, dh=ch/rows;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    ctx.fillStyle='#b07d44';
    ctx.fillRect(cx0+c*dw+2, cy0+r*dh+2, dw-4, dh-4);
    ctx.fillStyle='#5e3a18';
    ctx.beginPath(); ctx.arc(cx0+c*dw+dw/2, cy0+r*dh+dh/2, 2.2, 0, Math.PI*2); ctx.fill();
  }

  // 오른쪽 경혈도 액자
  const fx0=W-70, fy0=70, fw=60, fh=150;
  ctx.fillStyle='#6b4a25'; ctx.fillRect(fx0-4,fy0-4,fw+8,fh+8);
  ctx.fillStyle='#fbf4e3'; ctx.fillRect(fx0,fy0,fw,fh);
  ctx.strokeStyle='#444'; ctx.lineWidth=2;
  const mx=fx0+fw/2;
  ctx.beginPath();
  ctx.arc(mx, fy0+24, 9, 0, Math.PI*2);
  ctx.moveTo(mx, fy0+33); ctx.lineTo(mx, fy0+95);
  ctx.moveTo(mx, fy0+45); ctx.lineTo(fx0+12, fy0+70);
  ctx.moveTo(mx, fy0+45); ctx.lineTo(fx0+fw-12, fy0+70);
  ctx.moveTo(mx, fy0+95); ctx.lineTo(fx0+14, fy0+135);
  ctx.moveTo(mx, fy0+95); ctx.lineTo(fx0+fw-14, fy0+135);
  ctx.stroke();
  ctx.fillStyle='#d23b3b';
  [[mx,fy0+50],[mx,fy0+70],[fx0+18,fy0+66],[fx0+fw-18,fy0+66],[mx,fy0+90]].forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],2.5,0,Math.PI*2); ctx.fill(); });

  // 벽시계
  const clx=W/2+34, cly=46, cr=20;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(clx,cly,cr,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(clx,cly); ctx.lineTo(clx,cly-11); ctx.moveTo(clx,cly); ctx.lineTo(clx+8,cly); ctx.stroke();

  // 진료 베드
  ctx.fillStyle='#5b7fa6'; ctx.fillRect(90,H*0.72-4,W-150,16);
  ctx.fillStyle='#7d9cbf'; ctx.fillRect(90,H*0.72-10,W-150,8);
  ctx.fillStyle='#46637f'; ctx.fillRect(96,H*0.72+12,8,22); ctx.fillRect(W-66,H*0.72+12,8,22);
}

function draw(){
  drawBackground();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  bullets.forEach(b=> drawNeedle(b.x, b.y));
  enemies.forEach(en=>{
    const t = enemyTypes[en.ti];
    if(t && t.ready){
      const s = en.size*1.9;
      ctx.drawImage(t.img, en.x - s/2, en.y - s/2, s, s);
    } else {
      ctx.font = en.size + 'px serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(en.emoji, en.x, en.y);
    }
    ctx.font = '700 10px sans-serif';
    ctx.fillStyle = '#3d2a12';
    ctx.fillText(en.label, en.x, en.y + en.size + 2);
  });
  items.forEach(it=>{
    if(it.kind==='boss'){
      ctx.beginPath(); ctx.arc(it.x, it.y, it.size/2+6, 0, Math.PI*2);
      ctx.fillStyle='rgba(60,200,120,0.25)'; ctx.fill();
      ctx.font = it.size + 'px serif';
      ctx.fillText('🧑‍⚕️', it.x, it.y);
      ctx.font='700 11px sans-serif';
      ctx.fillStyle='#1f8f4e';
      ctx.fillText('대표원장님', it.x, it.y + it.size/2 + 9);
      ctx.fillStyle='#d23b3b';
      ctx.fillText('었지마!'.replace('었','쏘'), it.x, it.y + it.size/2 + 22);
    } else {
      ctx.font = it.size + 'px serif';
      ctx.fillText('🏖️', it.x, it.y);
      ctx.font='700 11px sans-serif';
      ctx.fillStyle='#1c6fd0';
      ctx.fillText('연차 +1', it.x, it.y + it.size/2 + 9);
    }
  });
  particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life/40); ctx.fillStyle='#9fd8ff'; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  if(!(invuln>0 && (invuln>>2)%2===0)) drawFace(playerFace, player.x, player.y, player.size);
  for(let i=0;i<lives;i++) drawPouch(W-18 - i*26, 22);
  if(flash>0){ ctx.fillStyle='rgba(210,59,59,'+(flash/40)+')'; ctx.fillRect(0,0,W,H); }
  const best = Math.max(score, highScore);
  hud.innerHTML = '🏆 점수 <b>' + score + '</b><br>⭐ 최고 <b>' + best + '</b><br>🔥 레벨 <b>' + level + '</b>';
}

function loop(){ if(!running) return; update(); draw(); requestAnimationFrame(loop); }

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOver').classList.add('hidden');
  hud.classList.remove('hidden');
  resetGame(); loop();
}
function endGame(){
  running=false;
  if(score > highScore){ highScore = score; localStorage.setItem('shooterHighScore', String(highScore)); }
  hud.classList.add('hidden');
  document.getElementById('finalScore').textContent = '최종 점수: ' + score + ' (최고 ' + highScore + ')';
  document.getElementById('gameOver').classList.remove('hidden');
}

function fileToFace(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const im = new Image();
      im.onload = ()=>{
        const s = 256;
        const c = document.createElement('canvas'); c.width = s; c.height = s;
        const cx = c.getContext('2d');
        const scale = Math.max(s/im.width, s/im.height);
        const dw = im.width*scale, dh = im.height*scale;
        cx.drawImage(im, (s-dw)/2, (s-dh)/2, dw, dh);
        res(c.toDataURL('image/jpeg', 0.85));
      };
      im.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('fileInput').addEventListener('change', async e=>{
  const files = [...e.target.files].slice(0,4);
  if(!files.length) return;
  const loaded = await Promise.all(files.map(fileToFace));
  localStorage.setItem('friendFaces', JSON.stringify(loaded));
  loadSavedFaces();
  selectedIndex = 0;
  renderFaceChoices();
});

document.getElementById('resetLink').onclick = ()=>{
  localStorage.removeItem('friendFaces');
  faces = []; selectedIndex = 0; renderFaceChoices();
};

document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = startGame;
</script>
</body>
</html>
